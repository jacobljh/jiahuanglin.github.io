name: "Deploy static site"
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Plain static site: no Jekyll/Node build. Stage everything that should be
      # published, leaving out repo/source files that aren't part of the site.
      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='_site' \
            --exclude='.github' \
            --exclude='_posts' \
            --exclude='tools' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='all_lessons/rec-sys.md' \
            --exclude='.editorconfig' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            ./ _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
